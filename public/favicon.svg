<svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="48" height="48" rx="10" fill="#020818"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d6bf3"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#1d6bf3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer diamond -->
  <path d="M24 2 L46 24 L24 46 L2 24 Z" stroke="url(#g1)" stroke-width="1.8" fill="none" stroke-linejoin="round"/>

  <!-- Spokes -->
  <line x1="24" y1="2"  x2="24" y2="13" stroke="url(#g1)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="46" y1="24" x2="35" y2="24" stroke="url(#g1)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="46" x2="24" y2="35" stroke="url(#g1)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="2"  y1="24" x2="13" y2="24" stroke="url(#g1)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Inner diamond -->
  <path d="M24 13 L35 24 L24 35 L13 24 Z" stroke="url(#g2)" stroke-width="1.2" fill="rgba(29,107,243,0.12)" stroke-linejoin="round"/>

  <!-- Inner nodes -->
  <circle cx="24" cy="13" r="1.8" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="35" cy="24" r="1.8" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="24" cy="35" r="1.8" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="13" cy="24" r="1.8" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Outer nodes -->
  <circle cx="24" cy="2"  r="2.4" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="46" cy="24" r="2.4" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="24" cy="46" r="2.4" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="2"  cy="24" r="2.4" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Centre node -->
  <circle cx="24" cy="24" r="4.5" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="24" cy="24" r="2"   fill="#ffffff" opacity="0.95"/>
</svg>
